<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse - Physical Wellbeing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>.hidden { display: none !important; }</style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

<div id="view-loading" class="min-h-screen flex flex-col justify-center items-center">
    <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mb-4"></i>
    <h2 class="text-xl font-bold text-gray-200">Loading Synapse...</h2>
</div>

<div id="view-app" class="hidden flex-col flex-grow w-full">
    <header class="bg-gray-800 border-b border-gray-700 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-4 text-[#5f9f87]">
            <a href="login.html" class="p-1 hover:bg-gray-700 rounded-md transition-colors">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </a>
            <div class="flex items-center space-x-2">
                <i data-lucide="activity" class="stroke-[2.5] w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight hidden sm:block text-gray-100">Physical Wellbeing</h1>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-sm text-gray-400 hidden md:block">
                Logged in as <span class="font-medium text-gray-100" id="nav-email"></span>
            </div>
            <button id="logout-btn" class="flex items-center space-x-1 text-sm font-medium text-gray-400 hover:text-red-500 transition-colors">
                <i data-lucide="log-out" class="w-4 h-4"></i>
                <span>Logout</span>
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-6 w-full flex-grow space-y-8">

        <!-- daily summary dashboard -->
        <section>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center space-x-2">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-[#5f9f87]"></i>
                <span>Today's Summary</span>
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 text-center">
                    <p class="text-xs text-gray-400 mb-1">Steps Today</p>
                    <p id="summary-steps" class="text-2xl font-bold text-[#5f9f87]">0</p>
                    <p id="summary-step-goal" class="text-xs text-gray-500 mt-1">Goal: 10,000</p>
                </div>
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 text-center">
                    <p class="text-xs text-gray-400 mb-1">Step Progress</p>
                    <p id="summary-step-pct" class="text-2xl font-bold text-yellow-400">0%</p>
                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2">
                        <div id="step-progress-bar" class="bg-yellow-400 h-1.5 rounded-full transition-all" style="width:0%"></div>
                    </div>
                </div>
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 text-center">
                    <p class="text-xs text-gray-400 mb-1">Calories Burned</p>
                    <p id="summary-burned" class="text-2xl font-bold text-orange-400">0</p>
                    <p class="text-xs text-gray-500 mt-1">kcal</p>
                </div>
                <div class="bg-gray-800 rounded-xl p-4 border border-gray-700 text-center">
                    <p class="text-xs text-gray-400 mb-1">Net Calories</p>
                    <p id="summary-net" class="text-2xl font-bold text-blue-400">0</p>
                    <p class="text-xs text-gray-500 mt-1">consumed − burned</p>
                </div>
            </div>
        </section>

        <!-- step tracking section -->
        <section>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center space-x-2">
                <i data-lucide="footprints" class="w-5 h-5 text-[#5f9f87]"></i>
                <span>Step Tracking</span>
            </h2>
            <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 space-y-4">
                <div id="step-error" class="hidden p-3 bg-red-900/30 text-red-400 text-sm rounded-lg border border-red-800/50"></div>
                <div id="step-success" class="hidden p-3 bg-green-900/30 text-green-400 text-sm rounded-lg border border-green-800/50"></div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Steps Taken Today</label>
                        <input type="number" id="step-input" min="0" max="200000" placeholder="e.g. 8500"
                               class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Daily Step Goal</label>
                        <input type="number" id="step-goal-input" min="0" max="100000" placeholder="e.g. 10000"
                               class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                    </div>
                </div>
                <button id="save-steps-btn" class="px-4 py-2 bg-[#177a64] hover:bg-[#0b4533] text-white text-sm font-medium rounded-lg transition-colors">
                    Save / Update Steps
                </button>
            </div>
        </section>

        <!-- activity log section -->
        <section>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center space-x-2">
                <i data-lucide="dumbbell" class="w-5 h-5 text-[#5f9f87]"></i>
                <span>Log Activity</span>
            </h2>
            <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 space-y-4">
                <div id="activity-error" class="hidden p-3 bg-red-900/30 text-red-400 text-sm rounded-lg border border-red-800/50"></div>
                <div id="activity-success" class="hidden p-3 bg-green-900/30 text-green-400 text-sm rounded-lg border border-green-800/50"></div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Activity Type</label>
                        <select id="activity-type" class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm">
                            <option value="">Select activity...</option>
                            <option value="running">Running (High)</option>
                            <option value="cycling">Cycling (High)</option>
                            <option value="swimming">Swimming (High)</option>
                            <option value="gym">Gym / Weight Training (Medium)</option>
                            <option value="yoga">Yoga (Low)</option>
                            <option value="walking">Walking (Low)</option>
                            <option value="sports">Team Sports (Medium)</option>
                            <option value="hiit">HIIT (High)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Duration (minutes)</label>
                        <input type="number" id="activity-duration" min="1" max="600" placeholder="e.g. 30"
                               class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Your Weight (kg)</label>
                        <input type="number" id="activity-weight" min="20" max="300" placeholder="e.g. 70"
                               class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                        <p class="text-xs text-gray-500 mt-1">Used to calculate calories burned</p>
                    </div>
                </div>
                <div id="activity-calories-preview" class="hidden p-3 bg-gray-900/50 rounded-lg border border-gray-600 text-sm text-gray-300">
                    Estimated calories burned: <span id="calories-preview-value" class="font-bold text-orange-400"></span> kcal
                </div>
                <button id="log-activity-btn" class="px-4 py-2 bg-[#177a64] hover:bg-[#0b4533] text-white text-sm font-medium rounded-lg transition-colors">
                    Log Activity
                </button>
                <div id="activity-log-list" class="space-y-2 pt-2"></div>
            </div>
        </section>

        <!-- meal log section -->
        <section>
            <h2 class="text-lg font-semibold text-white mb-4 flex items-center space-x-2">
                <i data-lucide="utensils" class="w-5 h-5 text-[#5f9f87]"></i>
                <span>Log Meal</span>
            </h2>
            <div class="bg-gray-800 rounded-xl p-5 border border-gray-700 space-y-4">
                <div id="meal-error" class="hidden p-3 bg-red-900/30 text-red-400 text-sm rounded-lg border border-red-800/50"></div>
                <div id="meal-success" class="hidden p-3 bg-green-900/30 text-green-400 text-sm rounded-lg border border-green-800/50"></div>
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Meal Type</label>
                        <select id="meal-type" class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm">
                            <option value="">Select meal type...</option>
                            <option value="Breakfast">Breakfast</option>
                            <option value="Lunch">Lunch</option>
                            <option value="Dinner">Dinner</option>
                            <option value="Snack">Snack</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Portion Size</label>
                        <select id="meal-portion" class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm">
                            <option value="">Select portion...</option>
                            <option value="Small">Small</option>
                            <option value="Medium">Medium</option>
                            <option value="Large">Large</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Total Calories (kcal)</label>
                        <input type="number" id="meal-calories" min="0" max="5000" placeholder="e.g. 450"
                               class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                    </div>
                </div>
                <button id="log-meal-btn" class="px-4 py-2 bg-[#177a64] hover:bg-[#0b4533] text-white text-sm font-medium rounded-lg transition-colors">
                    Log Meal
                </button>
                <div id="meal-log-list" class="space-y-2 pt-2"></div>
            </div>
        </section>

    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import {
        getFirestore, doc, setDoc, getDoc, addDoc,
        collection, query, where, getDocs, orderBy, deleteDoc
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // [GAMIFICATION] Import the points manager to bridge physical activity with rewards
    import { PointsManager } from "./src/rewards/PointsManager.js";
    const pointsManager = new PointsManager();

    const firebaseConfig = {
        apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
        authDomain: "synapse21.firebaseapp.com",
        projectId: "synapse21",
        storageBucket: "synapse21.firebasestorage.app",
        messagingSenderId: "1026510421512",
        appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    lucide.createIcons();

    // met values per activity type, used in the calories burned formula
    const MET = {
        running: 9.8, cycling: 7.5, swimming: 8.0,
        gym: 5.0, yoga: 2.5, walking: 3.5,
        sports: 6.0, hiit: 10.0
    };

    // calories burned = met * weight(kg) * duration(hours)
    function calcCaloriesBurned(activityKey, durationMins, weightKg) {
        const met = MET[activityKey] || 5.0;
        return Math.round(met * weightKg * (durationMins / 60));
    }

    // returns today's date as a yyyy-mm-dd string for consistent firestore doc ids
    const todayStr = () => new Date().toISOString().split('T')[0];

    let uid = null;

    // listen for auth state, redirect to login if not signed in
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            uid = user.uid;
            document.getElementById('nav-email').innerText = user.email;
            document.getElementById('view-loading').classList.add('hidden');
            const appView = document.getElementById('view-app');
            appView.classList.remove('hidden');
            appView.classList.add('flex');
            await loadAll();
            lucide.createIcons();
        } else {
            window.location.href = 'login.html';
        }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = 'login.html'; });
    });

    // show a temporary feedback message, auto-hides after 3.5s
    function showMsg(id, msg, isError = false) {
        const el = document.getElementById(id);
        el.innerText = msg;
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 3500);
    }

    // load all three data sources then refresh the summary
    async function loadAll() {
        await loadSteps();
        await loadActivities();
        await loadMeals();
        updateSummary();
    }

    // fetch today's step entry from firestore and populate the inputs
    async function loadSteps() {
        const ref = doc(db, 'users', uid, 'stepEntries', todayStr());
        const snap = await getDoc(ref);
        if (snap.exists()) {
            const d = snap.data();
            document.getElementById('step-input').value = d.steps || 0;
            document.getElementById('step-goal-input').value = d.goal || 10000;
        }
    }

    // save or overwrite today's step entry (same doc id = same day = edit behaviour)
    document.getElementById('save-steps-btn').addEventListener('click', async () => {
        const steps = parseInt(document.getElementById('step-input').value);
        const goal = parseInt(document.getElementById('step-goal-input').value) || 10000;

        if (isNaN(steps) || steps < 0) {
            showMsg('step-error', 'Please enter a valid step count (must be 0 or more).', true);
            return;
        }
        if (steps > 200000) {
            showMsg('step-error', 'Step count seems too high. Please check your entry.', true);
            return;
        }

        const ref = doc(db, 'users', uid, 'stepEntries', todayStr());
        await setDoc(ref, {
            steps,
            goal,
            date: todayStr(),
            lastModified: new Date().toISOString(),
            userId: uid
        });

        // [GAMIFICATION] Calculate and credit points based on daily steps
        await pointsManager.awardPoints(uid, steps, "STEPS_LOG");


        showMsg('step-success', `Steps saved: ${steps.toLocaleString()} / ${goal.toLocaleString()}`);
        updateSummary();
    });

    // in-memory store for today's activity entries
    let activityEntries = [];

    // fetch today's activity entries from firestore
    async function loadActivities() {
        activityEntries = [];
        const ref = collection(db, 'users', uid, 'activityEntries');
        const q = query(ref, where('date', '==', todayStr()), orderBy('loggedAt', 'desc'));
        const snap = await getDocs(q);
        snap.forEach(d => activityEntries.push({ id: d.id, ...d.data() }));
        renderActivityList();
    }

    // render the activity list below the form
    function renderActivityList() {
        const container = document.getElementById('activity-log-list');
        if (activityEntries.length === 0) {
            container.innerHTML = '<p class="text-sm text-gray-500 italic">No activities logged today.</p>';
            return;
        }
        container.innerHTML = activityEntries.map(e => `
                <div class="flex justify-between items-center bg-gray-900 rounded-lg px-4 py-3 border border-gray-700">
                    <div>
                        <span class="font-medium text-sm text-white capitalize">${e.activityType}</span>
                        <span class="text-xs text-gray-400 ml-2">${e.durationMins} min · ${e.weightKg}kg</span>
                        <span class="text-xs text-orange-400 ml-2">${e.caloriesBurned} kcal burned</span>
                    </div>
                    <button onclick="deleteActivity('${e.id}')" class="text-gray-600 hover:text-red-500 transition-colors ml-4">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
        lucide.createIcons();
    }

    // delete a single activity entry by its firestore doc id
    window.deleteActivity = async (id) => {
        await deleteDoc(doc(db, 'users', uid, 'activityEntries', id));
        await loadActivities();
        updateSummary();
    };

    // show a live calorie preview whenever the user changes type, duration, or weight
    function updateCaloriePreview() {
        const type = document.getElementById('activity-type').value;
        const duration = parseFloat(document.getElementById('activity-duration').value);
        const weight = parseFloat(document.getElementById('activity-weight').value);
        const preview = document.getElementById('activity-calories-preview');
        if (type && duration > 0 && weight > 0) {
            const cal = calcCaloriesBurned(type, duration, weight);
            document.getElementById('calories-preview-value').innerText = cal;
            preview.classList.remove('hidden');
        } else {
            preview.classList.add('hidden');
        }
    }

    ['activity-type', 'activity-duration', 'activity-weight'].forEach(id => {
        document.getElementById(id).addEventListener('input', updateCaloriePreview);
    });

    // validate and save a new activity entry to firestore
    document.getElementById('log-activity-btn').addEventListener('click', async () => {
        const activityType = document.getElementById('activity-type').value;
        const durationMins = parseFloat(document.getElementById('activity-duration').value);
        const weightKg = parseFloat(document.getElementById('activity-weight').value);

        if (!activityType) { showMsg('activity-error', 'Please select an activity type.', true); return; }
        if (!durationMins || durationMins <= 0) { showMsg('activity-error', 'Please enter a valid duration (greater than 0).', true); return; }
        if (!weightKg || weightKg < 20) { showMsg('activity-error', 'Please enter a valid weight (minimum 20kg).', true); return; }

        const caloriesBurned = calcCaloriesBurned(activityType, durationMins, weightKg);

        await addDoc(collection(db, 'users', uid, 'activityEntries'), {
            activityType,
            durationMins,
            weightKg,
            caloriesBurned,
            date: todayStr(),
            loggedAt: new Date().toISOString(),
            userId: uid
        });

        // [GAMIFICATION] Award fixed points for completing a workout session
        await pointsManager.awardPoints(uid, 1, "ACTIVITY");

        showMsg('activity-success', `${activityType} logged — ${caloriesBurned} kcal burned.`);
        document.getElementById('activity-type').value = '';
        document.getElementById('activity-duration').value = '';
        document.getElementById('activity-weight').value = '';
        document.getElementById('activity-calories-preview').classList.add('hidden');
        await loadActivities();
        updateSummary();
    });

    // in-memory store for today's meal entries
    let mealEntries = [];

    // fetch today's meal entries from firestore
    async function loadMeals() {
        mealEntries = [];
        const ref = collection(db, 'users', uid, 'mealEntries');
        const q = query(ref, where('date', '==', todayStr()), orderBy('loggedAt', 'desc'));
        const snap = await getDocs(q);
        snap.forEach(d => mealEntries.push({ id: d.id, ...d.data() }));
        renderMealList();
    }

    // render the meal list below the form
    function renderMealList() {
        const container = document.getElementById('meal-log-list');
        if (mealEntries.length === 0) {
            container.innerHTML = '<p class="text-sm text-gray-500 italic">No meals logged today.</p>';
            return;
        }
        container.innerHTML = mealEntries.map(e => `
                <div class="flex justify-between items-center bg-gray-900 rounded-lg px-4 py-3 border border-gray-700">
                    <div>
                        <span class="font-medium text-sm text-white">${e.mealType}</span>
                        <span class="text-xs text-gray-400 ml-2">${e.portion} portion</span>
                        <span class="text-xs text-blue-400 ml-2">${e.totalCalories} kcal</span>
                    </div>
                    <button onclick="deleteMeal('${e.id}')" class="text-gray-600 hover:text-red-500 transition-colors ml-4">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            `).join('');
        lucide.createIcons();
    }

    // delete a single meal entry by its firestore doc id
    window.deleteMeal = async (id) => {
        await deleteDoc(doc(db, 'users', uid, 'mealEntries', id));
        await loadMeals();
        updateSummary();
    };

    // validate and save a new meal entry to firestore
    document.getElementById('log-meal-btn').addEventListener('click', async () => {
        const mealType = document.getElementById('meal-type').value;
        const portion = document.getElementById('meal-portion').value;
        const totalCalories = parseInt(document.getElementById('meal-calories').value);

        if (!mealType) { showMsg('meal-error', 'Please select a meal type.', true); return; }
        if (!portion) { showMsg('meal-error', 'Please select a portion size.', true); return; }
        if (isNaN(totalCalories) || totalCalories < 0) { showMsg('meal-error', 'Please enter a valid calorie amount (0 or more).', true); return; }

        await addDoc(collection(db, 'users', uid, 'mealEntries'), {
            mealType,
            portion,
            totalCalories,
            date: todayStr(),
            loggedAt: new Date().toISOString(),
            userId: uid
        });

        // [GAMIFICATION] Credit points for maintaining nutrition logs
        await pointsManager.awardPoints(uid, totalCalories, "MEAL");

        showMsg('meal-success', `${mealType} logged — ${totalCalories} kcal.`);
        document.getElementById('meal-type').value = '';
        document.getElementById('meal-portion').value = '';
        document.getElementById('meal-calories').value = '';
        await loadMeals();
        updateSummary();
    });

    // recalculate and display the daily summary from current in-memory data
    async function updateSummary() {
        const stepRef = doc(db, 'users', uid, 'stepEntries', todayStr());
        const stepSnap = await getDoc(stepRef);
        const steps = stepSnap.exists() ? (stepSnap.data().steps || 0) : 0;
        const goal = stepSnap.exists() ? (stepSnap.data().goal || 10000) : 10000;
        const pct = Math.min(100, Math.round((steps / goal) * 100));

        document.getElementById('summary-steps').innerText = steps.toLocaleString();
        document.getElementById('summary-step-goal').innerText = `Goal: ${goal.toLocaleString()}`;
        document.getElementById('summary-step-pct').innerText = `${pct}%`;
        document.getElementById('step-progress-bar').style.width = `${pct}%`;

        // sum up calories burned from all activity entries today
        const totalBurned = activityEntries.reduce((sum, e) => sum + (e.caloriesBurned || 0), 0);
        document.getElementById('summary-burned').innerText = totalBurned;

        // sum up calories consumed from all meal entries today
        const totalConsumed = mealEntries.reduce((sum, e) => sum + (e.totalCalories || 0), 0);

        // net = consumed minus burned, colour changes based on value
        const net = totalConsumed - totalBurned;
        const netEl = document.getElementById('summary-net');
        netEl.innerText = net;
        netEl.className = `text-2xl font-bold ${net < 0 ? 'text-green-400' : net > 500 ? 'text-red-400' : 'text-blue-400'}`;
    }
</script>
</body>
</html>
