<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse Peer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center">

    <div class="w-full max-w-xl p-8">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-lg">

            <!-- Header -->
            <div class="text-center mb-8">
                <div class="flex justify-center mb-3">
                    <div class="p-3 rounded-xl bg-[#177a64]/20 border border-[#177a64]/30">
                        <i data-lucide="heart-handshake" class="w-8 h-8 text-[#8ee4d2]"></i>
                    </div>
                </div>
                <h1 class="text-2xl font-bold text-white">Peer Support</h1>
                <p class="text-sm text-gray-400 mt-1">
                    Choose your role to continue
                </p>
            </div>

            <!-- Buttons -->
            <div class="space-y-4">

                <!-- Employee -->
                <a href="peerSupport_employee.html"
                   class="block w-full p-4 rounded-xl bg-[#177a64] hover:bg-[#0b4533] transition-colors text-center">
                    <div class="flex items-center justify-center gap-2">
                        <i data-lucide="user" class="w-5 h-5"></i>
                        <span class="font-medium">Continue as Employee</span>
                    </div>
                </a>

                <!-- Ambassador -->
                <a href="peerSupport_ambassador.html"
                   class="block w-full p-4 rounded-xl border border-gray-600 hover:bg-gray-700 transition-colors text-center">
                    <div class="flex items-center justify-center gap-2">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                        <span class="font-medium">Continue as Ambassador</span>
                    </div>
                </a>

            </div>

            <!-- Footer -->
            <div class="mt-8 text-center">
                <a href="login.html" class="text-sm text-gray-400 hover:text-red-400">
                    Logout / Switch Account
                </a>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>

</body>
</html>
