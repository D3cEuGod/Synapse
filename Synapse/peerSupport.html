<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse Peer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex items-center justify-center">

    <div class="text-center">
        <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mx-auto mb-4"></i>
        <h1 class="text-2xl font-bold text-white mb-2">Loading Peer Support...</h1>
        <p class="text-gray-400">Redirecting you to the correct page.</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
            authDomain: "synapse21.firebaseapp.com",
            projectId: "synapse21",
            storageBucket: "synapse21.firebasestorage.app",
            messagingSenderId: "1026510421512",
            appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function isAmbassador(profile) {
            if (profile.role && profile.role === "Ambassador") {
                return true;
            }

            if (Array.isArray(profile.roles) && profile.roles.includes("Ambassador")) {
                return true;
            }

            return false;
        }

        function isEmployee(profile) {
            if (profile.role && profile.role === "Employee") {
                return true;
            }

            if (Array.isArray(profile.roles) && profile.roles.includes("Employee")) {
                return true;
            }

            return false;
        }

        async function getCurrentUserProfile(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                throw new Error("No user profile found.");
            }

            return userSnap.data();
        }

        lucide.createIcons();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            try {
                const currentUserProfile = await getCurrentUserProfile(user.uid);

                if (isAmbassador(currentUserProfile)) {
                    window.location.href = "peerSupport_ambassador.html";
                    return;
                }

                if (isEmployee(currentUserProfile)) {
                    window.location.href = "peerSupport_employee.html";
                    return;
                }

                window.location.href = "login.html";
            } catch (error) {
                console.error(error);
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
