<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse Peer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center">

    <div class="w-full max-w-xl p-8">
        <div class="bg-gray-800 border border-gray-700 rounded-2xl p-8 shadow-lg text-center">
            <div class="flex justify-center mb-4">
                <div class="p-3 rounded-xl bg-[#177a64]/20 border border-[#177a64]/30">
                    <i data-lucide="heart-handshake" class="w-8 h-8 text-[#8ee4d2]"></i>
                </div>
            </div>

            <h1 class="text-2xl font-bold text-white">Peer Support</h1>
            <p class="text-sm text-gray-400 mt-2">
                Loading your peer support page...
            </p>

            <div class="mt-6 flex justify-center">
                <div class="w-10 h-10 border-4 border-gray-600 border-t-[#177a64] rounded-full animate-spin"></div>
            </div>

            <div class="mt-8 text-center">
                <a href="login.html" class="text-sm text-gray-400 hover:text-red-400">
                    Logout / Switch Account
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
            authDomain: "synapse21.firebaseapp.com",
            projectId: "synapse21",
            storageBucket: "synapse21.firebasestorage.app",
            messagingSenderId: "1026510421512",
            appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        function isAmbassador(profile) {
            if (profile.role && profile.role === "Ambassador") {
                return true;
            }

            if (Array.isArray(profile.roles) && profile.roles.includes("Ambassador")) {
                return true;
            }

            return false;
        }

        function isEmployee(profile) {
            if (profile.role && profile.role === "Employee") {
                return true;
            }

            if (Array.isArray(profile.roles) && profile.roles.includes("Employee")) {
                return true;
            }

            return false;
        }

        async function getCurrentUserProfile(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                throw new Error("No user profile found.");
            }

            return userSnap.data();
        }

        lucide.createIcons();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            try {
                const profile = await getCurrentUserProfile(user.uid);

                if (isAmbassador(profile)) {
                    window.location.href = "peerSupport_ambassador.html";
                    return;
                }

                if (isEmployee(profile)) {
                    window.location.href = "peerSupport_employee.html";
                    return;
                }

                alert("Your account does not have access to Peer Support.");
                window.location.href = "login.html";
            } catch (error) {
                console.error(error);
                alert("Could not load your peer support access.");
                window.location.href = "login.html";
            }
        });
    </script>

</body>
</html>
