<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Wellbeing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen">

    <div id="view-loading" class="min-h-screen flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8">
        <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mb-4"></i>
        <h2 class="text-xl font-bold text-gray-200">Loading Synapse...</h2>
    </div>

    <div id="view-auth" class="hidden min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-md">
            <div class="bg-gray-800 py-8 px-4 shadow-xl shadow-black/50 sm:rounded-xl sm:px-10 border border-gray-700">

                <form id="auth-form" class="space-y-5">

                    <div>
                        <label class="block text-sm font-medium text-gray-300">Work Email address</label>
                        <div class="mt-1">
                            <input type="email" id="email-input" required class="appearance-none block w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300">Password</label>
                        <div class="mt-1">
                            <input type="password" id="password-input" minlength="6" required class="appearance-none block w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                        </div>
                    </div>

                    <div id="confirm-password-field" class="hidden">
                        <label class="block text-sm font-medium text-gray-300">Confirm Password</label>
                        <div class="mt-1">
                            <input type="password" id="confirm-password-input" minlength="6" class="appearance-none block w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg shadow-sm text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87] sm:text-sm" />
                        </div>
                    </div>

                    <div>
                        <button type="submit" id="auth-submit-btn" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-[#177a64] hover:bg-[#0b4533] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-gray-800 focus:ring-[#5f9f87] transition-colors disabled:opacity-50">
                            Sign in
                        </button>
                    </div>

                    <div id="auth-error" class="hidden p-3 bg-red-900/30 text-red-400 text-sm rounded-lg border border-red-800/50 text-center"></div>
                </form>

                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-gray-800 text-gray-400">Or</span>
                        </div>
                    </div>

                    <div class="mt-6 text-center">
                        <button type="button" id="toggle-auth-mode-btn" class="text-sm font-medium text-[#82bfa8] hover:text-[#8ee4d2] cursor-pointer">
                            Don't have an account? Register here
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= DASHBOARD VIEW ================= -->
    <div id="view-dashboard" class="hidden min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-3xl">
            
            <div class="flex justify-between items-end mb-6 px-4 sm:px-0">
                <div>
                    <div class="flex items-center space-x-2 text-[#5f9f87] mb-2">
                        <i data-lucide="activity" class="stroke-[2.5] w-7 h-7"></i>
                        <h1 class="text-2xl font-bold text-white tracking-tight">Synapse Hub</h1>
                    </div>
                    <p class="text-sm text-gray-400">Welcome back, <span id="display-email"></span></p>
                </div>
                <div class="flex items-center gap-4">
                    <div id="notification-bell-container"></div>

                    <button id="logout-btn" class="flex items-center space-x-2 text-sm font-medium text-gray-400 hover:text-red-500 transition-colors pb-1">
                        <i data-lucide="log-out" class="w-4 h-4"></i>
                        <span class="hidden sm:inline">Logout</span>
                    </button>
                </div>
            </div>

            <div class="bg-gray-800 py-8 px-6 shadow-xl shadow-black/50 sm:rounded-xl border border-gray-700">
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 sm:gap-6">
                    
                    <a href="profiles.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="user" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Identity & Profile</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Foundation</p>
                    </a>

                    <a href="physical.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="activity" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Physical Wellbeing</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Activity & Diet</p>
                    </a>

                    <a href="mental.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="heart" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Mental Health</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Assessments</p>
                    </a>

                    <a href="peerSupport.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="users" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Peer Support</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Bookings</p>
                    </a>

                    <a href="rewards.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="award" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Rewards</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Gamification</p>
                    </a>

                    <a href="resources.html" class="group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="book-open" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Resources</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">Library & Alerts</p>
                    </a>

                    <a href="analytics.html" id="analytics-module-link" class="hidden group aspect-square flex flex-col items-center justify-center p-4 bg-gray-900 border border-gray-700 rounded-xl hover:border-[#177a64] hover:bg-gray-800 transition-all duration-200 text-center md:col-start-2">
                        <div class="p-3 bg-gray-800 group-hover:bg-[#177a64]/20 rounded-full mb-3 transition-colors">
                            <i data-lucide="bar-chart-2" class="text-[#5f9f87] group-hover:text-[#8ee4d2] transition-colors w-7 h-7"></i>
                        </div>
                        <h3 class="font-semibold text-gray-200 group-hover:text-white text-sm sm:text-base">Analytics</h3>
                        <p class="text-xs text-gray-500 mt-1 opacity-0 group-hover:opacity-100 transition-opacity">HR Dashboard</p>
                    </a>

                </div>
            </div>
            
        </div>
    </div>

    <script type="module">
        import { renderNotificationBell } from "./src/notification/notification-bell.js";
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword, 
            createUserWithEmailAndPassword, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            setDoc,
            getDoc
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
            authDomain: "synapse21.firebaseapp.com",
            projectId: "synapse21",
            storageBucket: "synapse21.firebasestorage.app",
            messagingSenderId: "1026510421512",
            appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd",
            measurementId: "G-RVV578PX0S"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;

        lucide.createIcons();
        let isLoginMode = true;

        const authForm = document.getElementById('auth-form');
        const submitBtn = document.getElementById('auth-submit-btn');
        const errorBox = document.getElementById('auth-error');
        const viewLoading = document.getElementById('view-loading');
        const viewAuth = document.getElementById('view-auth');
        const viewDash = document.getElementById('view-dashboard');
        const confirmFieldWrapper = document.getElementById('confirm-password-field');
        const confirmInput = document.getElementById('confirm-password-input');

        function showView(viewId) {
            viewLoading.classList.add('hidden');
            viewAuth.classList.add('hidden');
            viewDash.classList.add('hidden');
            document.getElementById('view-' + viewId).classList.remove('hidden');
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('display-email').innerText = user.email;
                showView('dashboard');

                renderNotificationBell(user.uid);

                try {
                    const userDocRef = doc(db, 'users', user.uid);
                    const docSnap = await getDoc(userDocRef);
                    if (docSnap.exists() && docSnap.data().roles?.includes('Admin')) {
                        document.getElementById('analytics-module-link').classList.remove('hidden');
                    } else {
                        document.getElementById('analytics-module-link').classList.add('hidden');
                    }
                } catch (error) {
                    console.error("Error fetching user role:", error);
                }
            } else {
                showView('auth');
            }
        });

        document.getElementById('toggle-auth-mode-btn').addEventListener('click', function() {
            isLoginMode = !isLoginMode;
            this.innerText = isLoginMode ? "Don't have an account? Register here" : "Already registered? Sign in";
            submitBtn.innerText = isLoginMode ? "Sign in" : "Register";
            
            if (isLoginMode) {
                confirmFieldWrapper.classList.add('hidden');
                confirmInput.required = false;
            } else {
                confirmFieldWrapper.classList.remove('hidden');
                confirmInput.required = true;
            }
        });

        authForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            errorBox.classList.add('hidden');
            
            const email = document.getElementById('email-input').value;
            const userPassword = document.getElementById('password-input').value;

            if (!isLoginMode) {
                const confirmPassword = confirmInput.value;
                if (userPassword !== confirmPassword) {
                    errorBox.innerText = "Passwords do not match.";
                    errorBox.classList.remove('hidden');
                    return;
                }
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                if (isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, userPassword);
                } else {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, userPassword);
                    const user = userCredential.user;

                    const profileRef = doc(db, 'users', user.uid);
                    await setDoc(profileRef, {
                        email: email,
                        roles: ['Employee'],
                        createdAt: new Date().toISOString()
                    });
                }
            } catch (error) {
                console.error("Auth Error:", error);
                errorBox.innerText = error.message.replace('Firebase: ', '');
                errorBox.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = isLoginMode ? "Sign in" : "Register";
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                showView('auth');
            });
        });
    </script>
</body>
</html>
