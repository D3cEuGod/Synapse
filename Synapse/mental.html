<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Wellbeing - Mental Health</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none !important; }
        /* Mood button states */
        .mood-btn { transition: all 0.2s ease; }
        .mood-btn.selected {
            transform: scale(1.12);
            box-shadow: 0 0 0 3px #5f9f87, 0 4px 20px rgba(95,159,135,0.35);
        }
        .mood-btn:hover:not(.selected) { transform: scale(1.06); }
        /* Question radio styling */
        .q-option input[type="radio"] { display: none; }
        .q-option label {
            display: flex; align-items: center; justify-content: center;
            padding: 0.5rem 0.75rem; border: 1px solid #374151; border-radius: 0.5rem;
            cursor: pointer; transition: all 0.15s ease; font-size: 0.8rem;
            color: #9ca3af; background: #111827; text-align: center;
        }
        .q-option input[type="radio"]:checked + label {
            background: #134e3a; border-color: #5f9f87; color: #a7f3d0; font-weight: 600;
        }
        .q-option label:hover { border-color: #5f9f87; color: #d1fae5; background: #1a2e26; }
        /* Progress bar animation */
        .progress-fill { transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        /* Tab active */
        .tab-btn.active { background: #177a64; color: white; box-shadow: 0 2px 8px rgba(23,122,100,0.4); }
        .tab-btn { transition: all 0.2s ease; }
        /* Risk badge pulse */
        @keyframes risk-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); }
        }
        .risk-high { animation: risk-pulse 2s infinite; }
        /* Mood history bar */
        .mood-bar { transition: height 0.5s ease; }
        /* Slide-in for panels */
        @keyframes slide-in {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .panel-appear { animation: slide-in 0.3s ease forwards; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <div id="view-loading" class="min-h-screen flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8">
        <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mb-4"></i>
        <h2 class="text-xl font-bold text-gray-200">Loading Synapse...</h2>
    </div>

    <div id="view-app" class="hidden flex-col flex-grow w-full">

        <header class="bg-gray-800 shadow-sm border-b border-gray-700 px-6 py-4 flex justify-between items-center sticky top-0 z-10">
            <div class="flex items-center space-x-4 text-[#5f9f87]">
                <a href="login.html" class="p-1 hover:bg-gray-700 rounded-md transition-colors">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </a>
                <div class="flex items-center space-x-2">
                    <i data-lucide="heart" class="stroke-[2.5] w-6 h-6"></i>
                    <h1 class="text-xl font-bold tracking-tight hidden sm:block text-gray-100">Mental Health</h1>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <div class="text-sm text-gray-400 hidden md:block">
                    Logged in as <span class="font-medium text-gray-100" id="nav-email"></span>
                </div>
                <button id="logout-btn" class="flex items-center space-x-1 text-sm font-medium text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <main class="max-w-4xl mx-auto p-4 sm:p-6 w-full flex-grow">

            <div class="mb-6">
                <h2 class="text-2xl font-bold text-white">Mental Wellbeing</h2>
                <p class="text-gray-400 text-sm mt-1">Track your mood and complete wellbeing assessments.</p>
            </div>

            <div class="flex space-x-2 mb-6 bg-gray-800 p-1 rounded-xl border border-gray-700">
                <button class="tab-btn active flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold" data-tab="mood" onclick="switchTab('mood')">
                    <span class="flex items-center justify-center space-x-2">
                        <i data-lucide="smile" class="w-4 h-4"></i>
                        <span>Daily Mood</span>
                    </span>
                </button>
                <button class="tab-btn flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold text-gray-400 hover:text-white" data-tab="assessment" onclick="switchTab('assessment')">
                    <span class="flex items-center justify-center space-x-2">
                        <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                        <span>Self-Assessment</span>
                    </span>
                </button>
                <button class="tab-btn flex-1 py-2.5 px-4 rounded-lg text-sm font-semibold text-gray-400 hover:text-white" data-tab="insights" onclick="switchTab('insights')">
                    <span class="flex items-center justify-center space-x-2">
                        <i data-lucide="bar-chart-2" class="w-4 h-4"></i>
                        <span>Insights</span>
                    </span>
                </button>
            </div>


    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
            authDomain: "synapse21.firebaseapp.com",
            projectId: "synapse21",
            storageBucket: "synapse21.firebasestorage.app",
            messagingSenderId: "1026510421512",
            appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.db = db;

        lucide.createIcons();

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('nav-email').innerText = user.email;
                document.getElementById('view-loading').classList.add('hidden');
                const appView = document.getElementById('view-app');
                appView.classList.remove('hidden');
                appView.classList.add('flex');
                window.currentUser = user; 
            } else {
                window.location.href = 'login.html'; 
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
