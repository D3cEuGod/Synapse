<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse Wellbeing - Employee Peer Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <div id="view-loading" class="min-h-screen flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8">
        <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mb-4"></i>
        <h2 class="text-xl font-bold text-gray-200">Loading Synapse...</h2>
    </div>

    <div id="view-app" class="hidden flex-col flex-grow w-full">
        <header class="bg-gray-800 shadow-sm border-b border-gray-700 px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-4 text-[#5f9f87]">
                <a href="login.html" class="p-1 hover:bg-gray-700 rounded-md transition-colors">
                    <i data-lucide="chevron-left" class="w-6 h-6"></i>
                </a>
                <div class="flex items-center space-x-2">
                    <i data-lucide="users" class="stroke-[2.5] w-6 h-6"></i>
                    <h1 class="text-xl font-bold tracking-tight hidden sm:block text-gray-100">Employee Peer Support</h1>
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <div class="text-sm text-gray-400 hidden md:block">
                    Logged in as <span class="font-medium text-gray-100" id="nav-email"></span>
                </div>
                <button id="logout-btn" class="flex items-center space-x-1 text-sm font-medium text-gray-400 hover:text-red-500 transition-colors">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    <span>Logout</span>
                </button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6 w-full flex-grow">
            <section class="mb-6">
                <h2 class="text-2xl font-bold text-white mb-2">Book a Wellbeing Session</h2>
                <p class="text-sm text-gray-400">
                    Browse available ambassador time slots and send a support request.
                </p>
            </section>

            <div id="message-box" class="hidden mb-6 rounded-lg border px-4 py-3 text-sm"></div>

            <section class="bg-gray-800 border border-gray-700 rounded-xl p-5 mb-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Search ambassador</label>
                        <input
                            id="search-input"
                            type="text"
                            placeholder="Search by ambassador name"
                            class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87]"
                        />
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Filter by date</label>
                        <input
                            id="date-input"
                            type="date"
                            class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87]"
                        />
                    </div>

                    <div class="flex items-end gap-3">
                        <button
                            id="clear-filters-btn"
                            class="px-4 py-2 rounded-lg border border-gray-600 text-gray-300 hover:bg-gray-700 transition-colors"
                        >
                            Clear
                        </button>
                        <button
                            id="refresh-btn"
                            class="px-4 py-2 rounded-lg bg-[#177a64] hover:bg-[#0b4533] text-white transition-colors"
                        >
                            Refresh
                        </button>
                    </div>
                </div>
            </section>

            <section class="grid grid-cols-1 xl:grid-cols-3 gap-6">
                <div class="xl:col-span-2 bg-gray-800 border border-gray-700 rounded-xl p-5">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-white">Available ambassador slots</h3>
                        <span id="results-count" class="text-sm text-gray-400">0 slots</span>
                    </div>

                    <div id="slots-loading" class="hidden text-sm text-gray-400 mb-4">
                        Loading availability...
                    </div>

                    <div id="slots-list" class="space-y-3"></div>
                </div>

                <div class="bg-gray-800 border border-gray-700 rounded-xl p-5">
                    <h3 class="text-lg font-semibold text-white mb-4">Request session</h3>

                    <form id="request-form" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Selected slot</label>
                            <input
                                id="selected-slot-display"
                                type="text"
                                readonly
                                placeholder="Choose a slot first"
                                class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-gray-300"
                            />
                        </div>

                        <div>
                            <label class="block text-sm font-medium text-gray-300 mb-1">Support message</label>
                            <textarea
                                id="request-message"
                                rows="5"
                                placeholder="Briefly explain what support you would like."
                                class="w-full px-3 py-2 bg-gray-900 border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-[#5f9f87] focus:border-[#5f9f87]"
                            ></textarea>
                        </div>

                        <button
                            type="submit"
                            class="w-full py-2.5 rounded-lg bg-[#177a64] hover:bg-[#0b4533] text-white font-medium transition-colors"
                        >
                            Submit Support Request
                        </button>
                    </form>
                </div>
            </section>

            <section class="bg-gray-800 border border-gray-700 rounded-xl p-5 mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-white">My requests</h3>
                    <button
                        id="refresh-requests-btn"
                        class="px-4 py-2 rounded-lg border border-gray-600 text-gray-300 hover:bg-gray-700 transition-colors text-sm"
                    >
                        Refresh Requests
                    </button>
                </div>

                <div id="requests-loading" class="hidden text-sm text-gray-400 mb-4">
                    Loading requests...
                </div>

                <div id="my-requests-list" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import {
            getFirestore,
            doc,
            getDoc,
            collection,
            getDocs,
            query,
            where,
            addDoc,
            serverTimestamp,
            orderBy
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDloPoJ6z-gNgv9bSIGUjrTNh48ZLvrPHo",
            authDomain: "synapse21.firebaseapp.com",
            projectId: "synapse21",
            storageBucket: "synapse21.firebaseapp.com",
            messagingSenderId: "1026510421512",
            appId: "1:1026510421512:web:551d0bf8af2d9e14085bbd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let currentUserProfile = null;
        let allSlots = [];
        let selectedSlot = null;

        const messageBox = document.getElementById("message-box");
        const slotsList = document.getElementById("slots-list");
        const slotsLoading = document.getElementById("slots-loading");
        const requestsLoading = document.getElementById("requests-loading");
        const myRequestsList = document.getElementById("my-requests-list");
        const searchInput = document.getElementById("search-input");
        const dateInput = document.getElementById("date-input");
        const selectedSlotDisplay = document.getElementById("selected-slot-display");

        function showMessage(message, type = "success") {
            messageBox.textContent = message;
            messageBox.classList.remove("hidden", "bg-red-900/30", "border-red-800/50", "text-red-300", "bg-green-900/30", "border-green-800/50", "text-green-300");

            if (type === "error") {
                messageBox.classList.add("bg-red-900/30", "border", "border-red-800/50", "text-red-300");
            } else {
                messageBox.classList.add("bg-green-900/30", "border", "border-green-800/50", "text-green-300");
            }
        }

        function clearMessage() {
            messageBox.classList.add("hidden");
            messageBox.textContent = "";
        }

        function getStatusClass(status) {
            switch (status) {
                case "PENDING":
                    return "text-yellow-300";
                case "ACCEPTED":
                    return "text-green-300";
                case "DECLINED":
                case "CANCELLED":
                    return "text-red-300";
                default:
                    return "text-gray-300";
            }
        }

        async function getCurrentUserProfile(uid) {
            const userRef = doc(db, "users", uid);
            const userSnap = await getDoc(userRef);

            if (!userSnap.exists()) {
                throw new Error("No user profile found.");
            }

            return userSnap.data();
        }

        function isEmployee(profile) {
            if (profile.role && profile.role === "Employee") {
                return true;
            }

            if (Array.isArray(profile.roles) && profile.roles.includes("Employee")) {
                return true;
            }

            return false;
        }

        function renderSlots() {
            const searchValue = searchInput.value.trim().toLowerCase();
            const selectedDate = dateInput.value;

            const filtered = allSlots.filter(slot => {
                const name = (slot.ambassadorName || "").toLowerCase();
                const matchesName = name.includes(searchValue);
                const matchesDate = !selectedDate || slot.date === selectedDate;
                return matchesName && matchesDate;
            });

            document.getElementById("results-count").textContent = `${filtered.length} slot${filtered.length === 1 ? "" : "s"}`;

            if (filtered.length === 0) {
                slotsList.innerHTML = `
                    <div class="rounded-lg border border-dashed border-gray-600 p-6 text-center text-gray-400">
                        No available ambassador slots found.
                    </div>
                `;
                return;
            }

            slotsList.innerHTML = filtered.map(slot => `
                <div class="bg-gray-900 border border-gray-700 rounded-xl p-4 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                    <div>
                        <p class="font-semibold text-white">${slot.ambassadorName || "Unknown Ambassador"}</p>
                        <p class="text-sm text-gray-400 mt-1">${slot.date} • ${slot.startTime} - ${slot.endTime}</p>
                        <p class="text-xs text-green-300 mt-2">Status: AVAILABLE</p>
                    </div>
                    <button
                        class="select-slot-btn px-4 py-2 rounded-lg bg-[#177a64] hover:bg-[#0b4533] text-white text-sm font-medium transition-colors"
                        data-slot-id="${slot.id}"
                    >
                        Select Slot
                    </button>
                </div>
            `).join("");
        }

        async function loadAvailability() {
            slotsLoading.classList.remove("hidden");
            slotsList.innerHTML = "";

            try {
                const availabilityQuery = query(
                    collection(db, "availabilitySlots"),
                    where("status", "==", "AVAILABLE")
                );

                const snapshot = await getDocs(availabilityQuery);
                const slots = [];

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    slots.push({
                        id: docSnap.id,
                        ambassadorId: data.ambassadorId || "",
                        ambassadorName: data.ambassadorName || "",
                        date: data.date || "",
                        startTime: data.startTime || "",
                        endTime: data.endTime || "",
                        status: data.status || ""
                    });
                });

                slots.sort((a, b) => {
                    return `${a.date} ${a.startTime}`.localeCompare(`${b.date} ${b.startTime}`);
                });

                allSlots = slots;
                renderSlots();
            } catch (error) {
                console.error(error);
                showMessage("Could not load ambassador availability.", "error");
            } finally {
                slotsLoading.classList.add("hidden");
            }
        }

        function setSelectedSlot(slotId) {
            const slot = allSlots.find(item => item.id === slotId);
            if (!slot) return;

            selectedSlot = slot;
            selectedSlotDisplay.value = `${slot.ambassadorName} • ${slot.date} • ${slot.startTime} - ${slot.endTime}`;
            clearMessage();
        }

        async function submitSupportRequest(event) {
            event.preventDefault();
            clearMessage();

            if (!selectedSlot) {
                showMessage("Please select a slot first.", "error");
                return;
            }

            const message = document.getElementById("request-message").value.trim();

            try {
                await addDoc(collection(db, "supportRequests"), {
                    employeeId: currentUser.uid,
                    employeeEmail: currentUser.email,
                    employeeName:
                        currentUserProfile.firstName && currentUserProfile.lastName
                            ? `${currentUserProfile.firstName} ${currentUserProfile.lastName}`
                            : currentUser.email,
                    ambassadorId: selectedSlot.ambassadorId,
                    ambassadorName: selectedSlot.ambassadorName,
                    slotId: selectedSlot.id,
                    date: selectedSlot.date,
                    startTime: selectedSlot.startTime,
                    endTime: selectedSlot.endTime,
                    message: message,
                    status: "PENDING",
                    createdAt: serverTimestamp()
                });

                showMessage("Support request submitted successfully.");
                document.getElementById("request-form").reset();
                selectedSlot = null;
                selectedSlotDisplay.value = "";

                await loadMyRequests();
            } catch (error) {
                console.error(error);
                showMessage("Could not submit support request.", "error");
            }
        }

        async function loadMyRequests() {
            requestsLoading.classList.remove("hidden");
            myRequestsList.innerHTML = "";

            try {
                const requestsQuery = query(
                    collection(db, "supportRequests"),
                    where("employeeId", "==", currentUser.uid),
                    orderBy("createdAt", "desc")
                );

                const snapshot = await getDocs(requestsQuery);
                const requests = [];

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    requests.push({
                        id: docSnap.id,
                        ambassadorName: data.ambassadorName || "Unknown Ambassador",
                        date: data.date || "",
                        startTime: data.startTime || "",
                        endTime: data.endTime || "",
                        message: data.message || "",
                        status: data.status || "PENDING"
                    });
                });

                if (requests.length === 0) {
                    myRequestsList.innerHTML = `
                        <div class="rounded-lg border border-dashed border-gray-600 p-6 text-center text-gray-400">
                            No support requests yet.
                        </div>
                    `;
                    return;
                }

                myRequestsList.innerHTML = requests.map(request => `
                    <div class="bg-gray-900 border border-gray-700 rounded-xl p-4">
                        <p class="font-semibold text-white">${request.ambassadorName}</p>
                        <p class="text-sm text-gray-400 mt-1">${request.date} • ${request.startTime} - ${request.endTime}</p>
                        <p class="text-sm text-gray-300 mt-2">${request.message || "No message provided."}</p>
                        <p class="text-xs mt-2 ${getStatusClass(request.status)}">Status: ${request.status}</p>
                    </div>
                `).join("");
            } catch (error) {
                console.error(error);
                showMessage("Could not load your requests.", "error");
            } finally {
                requestsLoading.classList.add("hidden");
            }
        }

        function bindEvents() {
            document.getElementById("logout-btn").addEventListener("click", async () => {
                await signOut(auth);
                window.location.href = "login.html";
            });

            document.getElementById("clear-filters-btn").addEventListener("click", () => {
                searchInput.value = "";
                dateInput.value = "";
                renderSlots();
            });

            document.getElementById("refresh-btn").addEventListener("click", async () => {
                clearMessage();
                await loadAvailability();
            });

            document.getElementById("refresh-requests-btn").addEventListener("click", async () => {
                clearMessage();
                await loadMyRequests();
            });

            searchInput.addEventListener("input", renderSlots);
            dateInput.addEventListener("change", renderSlots);

            document.getElementById("request-form").addEventListener("submit", submitSupportRequest);

            document.addEventListener("click", (event) => {
                const button = event.target.closest(".select-slot-btn");
                if (!button) return;
                setSelectedSlot(button.dataset.slotId);
            });
        }

        lucide.createIcons();

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "login.html";
                return;
            }

            try {
                currentUser = user;
                currentUserProfile = await getCurrentUserProfile(user.uid);

                if (!isEmployee(currentUserProfile)) {
                    document.getElementById("view-loading").classList.add("hidden");
                    const appView = document.getElementById("view-app");
                    appView.classList.remove("hidden");
                    appView.classList.add("flex");

                    document.getElementById("nav-email").innerText = user.email;
                    showMessage("Access denied. This page is for employees only.", "error");

                    slotsList.innerHTML = `
                        <div class="rounded-lg border border-dashed border-red-800 p-6 text-center text-red-300">
                            You do not have permission to access employee peer support features.
                        </div>
                    `;
                    return;
                }

                document.getElementById("nav-email").innerText = user.email;
                document.getElementById("view-loading").classList.add("hidden");

                const appView = document.getElementById("view-app");
                appView.classList.remove("hidden");
                appView.classList.add("flex");

                bindEvents();
                await loadAvailability();
                await loadMyRequests();
            } catch (error) {
                console.error(error);
                document.getElementById("view-loading").classList.add("hidden");
                const appView = document.getElementById("view-app");
                appView.classList.remove("hidden");
                appView.classList.add("flex");
                showMessage("Could not load employee peer support page.", "error");
            }
        });
    </script>
</body>
</html>
