<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Synapse Wellbeing - HR-Manage-Rewards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module" src="src/rewards/manage-rewards-service.js"></script>
    <style>
        .hidden { display: none !important; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans antialiased min-h-screen flex flex-col">

    <div id="view-loading" class="min-h-screen flex flex-col justify-center items-center py-12 sm:px-6 lg:px-8">
        <i data-lucide="activity" class="stroke-[2.5] w-12 h-12 text-[#5f9f87] animate-pulse mb-4"></i>
        <h2 class="text-xl font-bold text-gray-200">Loading Synapse...</h2>
    </div>

    <div id="view-app" class="hidden flex-col flex-grow w-full">
        <header id="app-header"></header>

        <main id="app-main-content" class="max-w-6xl mx-auto p-6 w-full flex-grow">
    <div class="space-y-8">
        
        <div class="flex items-center gap-4">
            <a href="rewards.html" class="p-2 bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
                <i data-lucide="chevron-left" class="w-5 h-5 text-gray-300"></i>
            </a>
            <h1 class="text-3xl font-bold text-gray-100 tracking-tight">Manage Rewards</h1>
        </div>

        <div class="flex flex-col lg:flex-row gap-8 items-start">
            
            <div class="w-full lg:w-[70%] space-y-4">
                <div class="flex justify-between items-end pb-2">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Rewards Catalogue</h2>
                    <span class="text-[10px] bg-amber-600/10 text-amber-500 px-2 py-0.5 rounded border border-amber-600/30 font-bold uppercase tracking-widest">Admin</span>
                </div>

                <div class="bg-gray-800/60 border border-gray-700 rounded-xl shadow-xl overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-900/40 text-[10px] font-bold text-gray-500 uppercase tracking-widest">
                            <tr>
                                <th class="p-4">Reward Name</th>
                                <th class="p-4 text-center">Type</th>
                                <th class="p-4 text-center">Cost</th>
                                <th class="p-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="admin-rewards-list" class="divide-y divide-gray-700">
                            </tbody>
                    </table>
                </div>
            </div>

            <aside class="w-full lg:w-[30%] space-y-4">
                <div class="pb-2">
                    <h2 class="text-sm font-bold text-gray-400 uppercase tracking-widest">Analytics</h2>
                </div>

                <div class="bg-gray-800/40 border border-gray-700 rounded-xl p-6 h-fit shadow-lg">
                    <div class="flex items-center gap-2 text-[#5f9f87] border-b border-gray-800 pb-3 mb-6">
                        <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
                        <h2 class="text-xs font-bold uppercase tracking-widest text-gray-200">Catalogue Overview</h2>
                    </div>
                    
                    <div class="space-y-6">
                        <div class="flex justify-between items-baseline">
                            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Total Listed</p>
                            <p id="stat-total-rewards" class="text-xl font-bold text-white">-</p>
                        </div>
                        <div class="flex justify-between items-baseline">
                            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Avg. Cost</p>
                            <p id="stat-avg-cost" class="text-xl font-bold text-[#5f9f87]">-</p>
                        </div>
                        <div class="pt-4 border-t border-gray-700/50">
                            <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mb-1">Most Claimed</p>
                            <p id="stat-most-claimed" class="text-md font-bold text-amber-500 leading-tight">-</p>
                        </div>
                    </div>
                </div>
            </aside>
            
        </div>
    </div>
</main>
    </div>

    <script type="module">
        import { db } from "./src/firebase-config.js";
        import { initAppShell } from "./src/app-shell.js";
        window.db = db;
        initAppShell();
    </script>
</body>
</html>
